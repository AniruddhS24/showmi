<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Showmi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>

  <!-- ── Header ── -->
  <header id="header">
    <div class="header-left">
      <button id="chats-btn" class="icon-btn" title="Chats">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="15" y2="18"/>
        </svg>
      </button>
      <span id="status-indicator" class="status disconnected" title="Disconnected"></span>
    </div>
    <div class="header-center">
      <span id="chat-title" class="chat-title"></span>
    </div>
    <div class="header-right">
      <button id="record-btn" class="label-btn label-btn-rec" title="Record workflow"><span class="rec-dot"></span>rec</button>
      <button id="memory-btn" class="label-btn" title="Memory">mem</button>
      <button id="workflows-btn" class="label-btn" title="Skills">skills</button>
      <button id="theme-btn" class="icon-btn" title="Toggle theme">
        <svg class="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button id="new-chat-btn" class="icon-btn" title="New chat">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Chats drawer ── -->
  <div id="chats-drawer" class="drawer hidden">
    <div class="drawer-header">
      <span class="drawer-title">chats</span>
      <button id="chats-close" class="icon-btn" title="Close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="drawer-body" id="chats-list">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- ── Memory drawer ── -->
  <div id="memory-drawer" class="drawer hidden">
    <div class="drawer-header">
      <span class="drawer-title">memory</span>
      <button id="memory-close" class="icon-btn" title="Close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="drawer-body" id="memory-list">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- ── Workflows drawer ── -->
  <div id="workflows-drawer" class="drawer hidden">
    <div class="drawer-header">
      <span class="drawer-title">skills</span>
      <button id="workflows-close" class="icon-btn" title="Close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="drawer-body" id="workflows-list">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- ── Models manager overlay ── -->
  <div id="models-overlay" class="overlay hidden">
    <div class="overlay-panel">
      <div class="overlay-header">
        <span class="overlay-title">manage models</span>
        <button id="models-close" class="icon-btn" title="Close">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="overlay-body">
        <div id="models-list-full" class="models-list-full">
          <!-- Populated by JS -->
        </div>
        <button id="add-model-btn" class="add-model-btn">+ add model</button>

        <!-- Model editor -->
        <div id="model-editor" class="model-editor hidden">
          <div class="section-label" id="editor-title">new model</div>
          <div class="field">
            <label for="edit-name">name</label>
            <input id="edit-name" type="text" placeholder="my-model" spellcheck="false" />
          </div>
          <div class="field">
            <label for="edit-provider">provider</label>
            <div class="select-with-icon">
              <span id="provider-icon" class="provider-icon"></span>
              <select id="edit-provider">
                <option value="anthropic">anthropic</option>
                <option value="openai">openai</option>
                <option value="local">local</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label for="edit-api-key">api key</label>
            <div class="input-with-toggle">
              <input id="edit-api-key" type="password" placeholder="sk-..." spellcheck="false" />
              <button class="toggle-visibility icon-btn" title="Show/hide">
                <svg class="eye-open" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
                <svg class="eye-closed" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="field">
            <label for="edit-base-url">base url</label>
            <input id="edit-base-url" type="text" placeholder="https://api.anthropic.com" spellcheck="false" />
          </div>
          <div class="field">
            <label for="edit-model">model id</label>
            <input id="edit-model" type="text" placeholder="claude-sonnet-4-20250514" spellcheck="false" />
          </div>
          <div class="field">
            <label for="edit-temperature">temperature <span id="temp-value" class="temp-value">0.5</span></label>
            <input id="edit-temperature" type="range" min="0" max="1" step="0.05" value="0.5" />
          </div>
          <div class="editor-actions">
            <button id="editor-cancel" class="btn btn-ghost">cancel</button>
            <button id="editor-save" class="btn btn-primary">save</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Disconnected banner ── -->
  <div id="disconnected-banner" class="disconnected-banner hidden">
    <div class="disconnected-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>
    <div class="disconnected-title">server not connected</div>
    <div class="disconnected-instructions">
      <div class="disconnected-step">
        <span class="disconnected-label">start the server</span>
        <div class="disconnected-cmd-wrap">
          <code class="disconnected-cmd" title="Click to copy">showmi start</code>
          <span class="copied-badge">copied</span>
        </div>
      </div>
      <div class="disconnected-divider">or</div>
      <div class="disconnected-step">
        <span class="disconnected-label">not installed?</span>
        <div class="disconnected-cmd-wrap">
          <code class="disconnected-cmd" title="Click to copy">curl -fsSL https://raw.githubusercontent.com/AniruddhS24/self-learning-browseruse/main/install.sh | sh</code>
          <span class="copied-badge">copied</span>
        </div>
      </div>
    </div>
    <div class="disconnected-retry">
      <button id="retry-connect-btn" class="btn btn-ghost">retry connection</button>
    </div>
  </div>

  <!-- ── Main content ── -->
  <main id="messages">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <p>describe a task to begin</p>
    </div>
  </main>

  <!-- ── Input ── -->
  <footer id="input-area">
    <div id="planning-bar" class="planning-bar hidden">
      <button id="planning-approve" class="btn btn-primary btn-sm">approve</button>
      <button id="planning-reject" class="btn btn-ghost btn-sm">reject</button>
      <button id="planning-test" class="btn btn-ghost btn-sm">test</button>
    </div>
    <div id="tab-context-badge" class="tab-context-badge hidden">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
      <span id="tab-context-url"></span>
      <button id="tab-context-remove" class="tab-context-remove" title="Remove tab context">
        <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div id="recording-overlay" class="recording-overlay hidden">
      <button id="overlay-stop-btn" class="btn btn-stop">
        <span class="stop-icon"></span> stop recording <span id="overlay-event-count" class="event-count">0</span>
      </button>
    </div>
    <!-- Model selector + logs row -->
    <div class="input-toolbar">
      <div class="model-selector" id="model-selector">
        <button class="model-badge" id="model-badge" title="Select model">
          <span id="model-badge-icon" class="model-badge-icon"></span>
          <span id="model-badge-name">no model</span>
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <label class="flash-toggle" title="Flash mode — faster but less precise">
          <input type="checkbox" id="flash-toggle" checked>
          <span class="flash-toggle-label">⚡ flash</span>
        </label>
        <div class="model-dropdown hidden" id="model-dropdown">
          <div class="model-dropdown-list" id="model-dropdown-list">
            <!-- Populated by JS -->
          </div>
          <button class="model-dropdown-action" id="manage-models-btn">manage models</button>
        </div>
      </div>
    </div>
    <div class="input-wrapper">
      <textarea id="message-input" placeholder="what should i do?" rows="1"></textarea>
      <button id="send-btn" title="Send" disabled>
        <svg class="send-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
        </svg>
        <svg class="stop-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </footer>

  <script src="sidepanel.js"></script>
</body>
</html>
