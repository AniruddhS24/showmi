<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Self-Learning Browser Agent</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <!-- Header -->
  <header id="header">
    <div class="header-left">
      <span class="logo">S</span>
      <span class="title">Browser Agent</span>
    </div>
    <div class="header-right">
      <span id="status-indicator" class="status disconnected" title="Disconnected"></span>
      <button id="settings-btn" class="icon-btn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.32 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Chat messages -->
  <main id="messages"></main>

  <!-- Input area -->
  <footer id="input-area">
    <textarea id="message-input" placeholder="Describe what you want to do..." rows="1"></textarea>
    <button id="send-btn" title="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </footer>

  <!-- Settings overlay -->
  <div id="settings-overlay" class="hidden">
    <div id="settings-panel">
      <div class="settings-header">
        <h2>Settings</h2>
        <button id="settings-close" class="icon-btn" title="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="settings-body">
        <label>
          <span>Provider</span>
          <select id="setting-provider">
            <option value="anthropic">Anthropic</option>
            <option value="openai">OpenAI</option>
            <option value="local">Local</option>
          </select>
        </label>
        <label>
          <span>API Key</span>
          <input id="setting-api-key" type="password" placeholder="sk-..." />
        </label>
        <label>
          <span>Base URL</span>
          <input id="setting-base-url" type="text" placeholder="https://api.anthropic.com" />
        </label>
        <label>
          <span>Model Name</span>
          <input id="setting-model" type="text" placeholder="claude-sonnet-4-20250514" />
        </label>
        <label>
          <span>Temperature: <span id="temp-value">0.5</span></span>
          <input id="setting-temperature" type="range" min="0" max="1" step="0.05" value="0.5" />
        </label>
        <button id="settings-save" class="primary-btn">Save</button>
      </div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
